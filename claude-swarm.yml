version: 1
swarm:
  name: Swarm Name
  main: lead_developer
  instances:
    lead_developer:
      description: Lead developer who coordinates the team and makes architectural decisions
      directory: .
      model: sonnet
      prompt: You are the lead developer coordinating the team
      allowed_tools:
        - Read
        - Edit
        - Bash
        - Write
      tools:
        - Read
        - Edit
        - Bash
        - Write
      connections:
        - frontend_dev
        - backend_dev
      mcps:
        - name: GSuite MCP
          type: stdio
    frontend_dev:
      description: Frontend developer specializing in React and modern web technologies
      directory: .
      model: sonnet
      prompt: You specialize in frontend development with React, TypeScript, and modern web technologies
      allowed_tools:
        - Read
        - Edit
        - Write
        - Bash(npm:*)
        - Bash(yarn:*)
        - Bash(pnpm:*)
      tools:
        - Read
        - Edit
        - Write
        - Bash(npm:*)
        - Bash(yarn:*)
        - Bash(pnpm:*)
      connections: []
      mcps: []
    backend_dev:
      description: Backend developer focusing on APIs, databases, and server architecture
      directory: .
      model: sonnet
      prompt: You specialize in backend development, APIs, databases, and server architecture
      allowed_tools:
        - Read
        - Edit
        - Write
        - Bash
      tools:
        - Read
        - Edit
        - Write
        - Bash
      connections: []
      mcps: []
